version: 1.3.6
cache: true

interface:
  agents:
    use: true
    create: true
  marketplace:
    use: true

actions:
  allowedDomains:
    - "localhost"
    - "127.0.0.1"
    - "host.docker.internal"
    - "10.79.60.14"

endpoints:
  custom:
    - name: "Contacts Assistant"
      apiKey: "dummy"
      stream: false  
      baseURL: "http://host.docker.internal:8080/librechat"
      models:
        default: ["contacts-gemini"]
        fetch: false
      titleConvo: false
      modelDisplayLabel: "Contacts Assistant"
      directEndpoint: false
      addParams:
        stream: false 
      dropParams:
        - "stop"
        - "user"
        - "frequency_penalty"
        - "presence_penalty"
        - "stream"
